<!-- version 1.0.0 スケジュールツール Web確認版 初回実装 -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>スケジュールツール Web確認版 v1.0.0</title>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root{
  --bg:#f5f7fb;
  --panel:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --line:#e5e7eb;
  --shadow:0 10px 30px rgba(15,23,42,.08);
  --orange:#f59e0b;
  --blue:#3b82f6;
  --pink:#ec4899;
  --red:#ef4444;
  --green:#22c55e;
  --yellow:#facc15;
  --purple:#8b5cf6;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif}
button,input,select,textarea{font:inherit}
body{min-height:100dvh}
.app{
  max-width:520px;
  margin:0 auto;
  min-height:100dvh;
  position:relative;
  background:linear-gradient(180deg,#f8fafc 0%,#f5f7fb 100%);
}
.screen{
  display:none;
  min-height:100dvh;
  padding:16px 16px 100px;
}
.screen.active{display:block}
.topbar{
  position:sticky;
  top:0;
  z-index:20;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:10px;
  padding:8px 0 16px;
  background:linear-gradient(180deg,rgba(245,247,251,.98) 80%,rgba(245,247,251,0));
  backdrop-filter:blur(10px);
}
.title{
  text-align:center;
  font-size:22px;
  font-weight:900;
  letter-spacing:.02em;
}
.seg{
  display:inline-flex;
  gap:6px;
  padding:4px;
  background:rgba(255,255,255,.75);
  border:1px solid rgba(255,255,255,.8);
  box-shadow:var(--shadow);
  border-radius:16px;
  backdrop-filter:blur(12px);
}
.seg button,.ghost-btn,.primary-btn,.sync-btn,.menu-action-btn,.cta-btn,.small-btn,.month-nav button,.week-swipe-btn{
  border:none;
  border-radius:14px;
  cursor:pointer;
  transition:.15s ease;
}
.seg button{
  padding:9px 12px;
  background:transparent;
  color:var(--muted);
  font-weight:800;
}
.seg button.active{
  background:rgba(255,255,255,.7);
  color:var(--text);
  box-shadow:0 3px 10px rgba(15,23,42,.08);
}
.sync-btn,.ghost-btn,.primary-btn,.cta-btn,.small-btn,.month-nav button,.week-swipe-btn{
  padding:12px 14px;
  background:rgba(255,255,255,.72);
  border:1px solid rgba(255,255,255,.86);
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);
  font-weight:800;
  color:var(--text);
}
.primary-btn,.cta-btn{
  background:#111827;
  color:#fff;
  border:1px solid rgba(17,24,39,.92);
}
.sync-btn:active,.ghost-btn:active,.primary-btn:active,.cta-btn:active,.seg button:active,.small-btn:active,.month-nav button:active,.week-swipe-btn:active{
  transform:translateY(1px) scale(.995);
}
.summary-bar{
  margin-top:12px;
  padding:14px 16px;
  border-radius:18px;
  background:rgba(255,255,255,.72);
  border:1px solid rgba(255,255,255,.86);
  box-shadow:var(--shadow);
  display:flex;
  justify-content:space-between;
  gap:16px;
  backdrop-filter:blur(12px);
}
.summary-item{font-size:13px;color:var(--muted)}
.summary-item strong{
  display:block;
  font-size:18px;
  color:var(--text);
  margin-top:4px;
}
.cards{display:flex;flex-direction:column;gap:12px}
.section-label,.month-header,.week-header{
  font-size:16px;
  font-weight:900;
  margin:10px 2px 12px;
}
.empty-box,.section-card,.register-panel,.confirm-pop,.ocr-box{
  background:rgba(255,255,255,.78);
  border:1px solid rgba(255,255,255,.88);
  border-radius:22px;
  box-shadow:var(--shadow);
}
.empty-box,.section-card{padding:14px}
.muted{color:var(--muted)}
.event-card{
  width:100%;
  aspect-ratio:3/1;
  min-height:116px;
  position:relative;
  border-radius:22px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.88);
  box-shadow:var(--shadow);
  padding:12px 14px 12px 18px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  text-align:left;
}
.event-card::before{
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;
  width:8px;
  background:var(--accent);
}
.event-type{
  position:absolute;
  right:12px;
  top:10px;
  font-size:12px;
  font-weight:900;
  letter-spacing:.04em;
  color:var(--accent);
}
.event-title{
  font-size:22px;
  font-weight:900;
  line-height:1.05;
  margin-right:92px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  min-height:44px;
}
.event-sub{
  margin-top:4px;
  font-size:12px;
  color:#374151;
  line-height:1.3;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.hearts{
  position:absolute;
  right:12px;
  bottom:10px;
  display:flex;
  gap:3px;
  flex-wrap:wrap;
  justify-content:flex-end;
  max-width:44%;
  font-size:12px;
  line-height:1;
}
.count-row{
  position:absolute;
  left:18px;
  bottom:10px;
  font-size:12px;
  color:var(--muted);
}
.day-list-label{
  font-size:18px;
  font-weight:900;
  margin:4px 0 12px;
}
.month-nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.calendar-grid{
  background:rgba(255,255,255,.78);
  border:1px solid rgba(255,255,255,.88);
  border-radius:22px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.weekdays,.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
}
.weekdays div{
  padding:10px 6px;
  text-align:center;
  font-size:11px;
  font-weight:800;
  color:var(--muted);
  background:rgba(255,255,255,.36);
}
.day-cell{
  min-height:74px;
  border-top:1px solid rgba(229,231,235,.9);
  border-right:1px solid rgba(229,231,235,.9);
  padding:6px;
  position:relative;
  background:rgba(255,255,255,.30);
}
.day-cell:nth-child(7n){border-right:none}
.day-cell.has-events{background:rgba(245,158,11,.10)}
.day-num{font-size:12px;font-weight:900}
.month-hearts{
  margin-top:6px;
  display:flex;
  flex-wrap:wrap;
  gap:2px;
  font-size:10px;
  line-height:1;
}
.week-wrap{
  display:flex;
  align-items:center;
  gap:10px;
}
.week-slide{
  flex:1;
  min-width:0;
}
.week-card{
  background:rgba(255,255,255,.78);
  border:1px solid rgba(255,255,255,.88);
  border-radius:22px;
  box-shadow:var(--shadow);
  padding:14px;
}
.week-list{
  display:grid;
  gap:10px;
}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12px;font-weight:900;color:var(--muted)}
.input,.textarea{
  width:100%;
  border:none;
  outline:none;
  border-radius:16px;
  padding:13px 14px;
  background:#fff;
  border:1px solid var(--line);
  color:var(--text);
}
.textarea{min-height:88px;resize:vertical}
.type-grid,.heart-grid{
  display:grid;
  gap:8px;
}
.type-grid{grid-template-columns:repeat(2,1fr)}
.heart-grid{grid-template-columns:repeat(4,1fr)}
.type-btn{
  padding:14px 10px;
  border-radius:18px;
  border:1px solid var(--line);
  background:#fff;
  font-weight:900;
}
.type-btn.active{outline:3px solid rgba(17,24,39,.08)}
.heart-item{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:12px 8px;
  border-radius:16px;
  background:#fff;
  border:1px solid var(--line);
  font-size:18px;
}
.row{display:flex;gap:10px}
.row>*{flex:1}
.participants-wrap{display:flex;flex-direction:column;gap:10px}
.participant-row{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:8px;
  align-items:center;
}
.helper{font-size:11px;color:var(--muted)}
.bottom-nav{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:calc(10px + env(safe-area-inset-bottom));
  width:min(520px,calc(100vw - 16px));
  padding:10px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  background:rgba(255,255,255,.76);
  border:1px solid rgba(255,255,255,.88);
  box-shadow:var(--shadow);
  border-radius:22px;
  backdrop-filter:blur(14px);
  z-index:50;
}
.bottom-nav button{
  min-height:54px;
  border:none;
  border-radius:18px;
  background:transparent;
  color:var(--muted);
  font-weight:900;
}
.bottom-nav button.active{
  background:rgba(255,255,255,.9);
  color:var(--text);
  box-shadow:0 4px 12px rgba(15,23,42,.08);
}
.overlay{
  position:fixed;
  inset:0;
  z-index:120;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(15,23,42,.18);
  backdrop-filter:blur(10px);
  padding:18px;
}
.overlay.show{display:flex}
.card-pop{
  width:min(92vw,470px);
  position:relative;
}
.detail-card{
  width:100%;
  min-height:210px;
  border-radius:24px;
  overflow:hidden;
  padding:14px 16px 16px 20px;
  position:relative;
  box-shadow:0 20px 50px rgba(15,23,42,.18);
  border:1px solid rgba(255,255,255,.88);
}
.detail-card::before{
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;
  width:9px;
  background:var(--accent);
}
.close-btn,.menu-btn{
  position:absolute;
  top:10px;
  width:40px;height:40px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,.88);
  box-shadow:var(--shadow);
  font-size:20px;
  font-weight:900;
}
.menu-btn{left:10px}
.close-btn{right:10px}
.detail-title{
  margin-top:28px;
  margin-right:56px;
  font-size:24px;
  font-weight:900;
  line-height:1.08;
  display:-webkit-box;
  -webkit-box-orient:vertical;
  -webkit-line-clamp:2;
  overflow:hidden;
}
.detail-type{
  font-size:12px;
  font-weight:900;
  color:var(--accent);
  margin-top:6px;
}
.detail-meta{
  margin-top:8px;
  font-size:13px;
  line-height:1.35;
}
.detail-hearts{
  position:absolute;
  right:14px;
  bottom:40px;
  display:flex;
  gap:4px;
  flex-wrap:wrap;
  justify-content:flex-end;
  max-width:35%;
}
.detail-count{
  position:absolute;
  left:20px;
  bottom:14px;
  font-size:13px;
  font-weight:900;
  color:#374151;
  cursor:pointer;
}
.menu-actions{
  position:absolute;
  left:10px;
  top:58px;
  display:none;
  flex-direction:column;
  gap:8px;
  width:160px;
  z-index:3;
}
.menu-actions.show{display:flex}
.menu-action-btn{
  min-height:42px;
  padding:10px 12px;
  background:rgba(255,255,255,.92);
  border:1px solid rgba(255,255,255,.88);
  box-shadow:var(--shadow);
  text-align:left;
  font-weight:900;
}
.form-pop{
  width:min(92vw,470px);
  max-height:86dvh;
  overflow:auto;
  background:rgba(255,255,255,.94);
  border:1px solid rgba(255,255,255,.92);
  border-radius:24px;
  box-shadow:0 20px 50px rgba(15,23,42,.18);
  padding:18px 16px 18px;
  position:relative;
}
.form-pop .menu-btn,.form-pop .close-btn{top:10px}
.form-pop .menu-btn{
  font-size:14px;
  width:auto;
  min-width:74px;
  padding:0 14px;
}
.form-pop-head{padding:42px 6px 8px}
.form-pop-title{font-size:22px;font-weight:900}
.form-pop-sub{font-size:12px;color:var(--muted);margin-top:4px}
.confirm-pop{
  width:min(90vw,420px);
  background:rgba(255,255,255,.97);
  border:1px solid rgba(255,255,255,.92);
  border-radius:24px;
  padding:18px;
  box-shadow:0 20px 50px rgba(15,23,42,.18);
}
.confirm-actions{
  display:flex;
  gap:8px;
  margin-top:16px;
  flex-wrap:wrap;
}
.confirm-actions button{flex:1;min-width:96px}
.toast{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:94px;
  background:#111827;
  color:#fff;
  padding:12px 16px;
  border-radius:999px;
  font-size:13px;
  z-index:200;
  opacity:0;
  pointer-events:none;
  transition:.2s ease;
}
.toast.show{opacity:1}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <section class="screen active" id="calendarScreen">
    <div class="topbar">
      <button class="sync-btn" id="bulkSyncCalendar">一括同期</button>
      <div class="title">カレンダー</div>
      <div class="seg" id="calendarSeg">
        <button data-mode="day" class="active">DAY</button>
        <button data-mode="week">WEEK</button>
        <button data-mode="month">MONTH</button>
      </div>
    </div>

    <div id="calendarDayView">
      <div class="day-list-label" id="dayLabel"></div>
      <div class="cards" id="calendarDayCards"></div>
      <div class="summary-bar">
        <div class="summary-item">イベント数<strong id="calendarDayCount">0</strong></div>
        <div class="summary-item">¥合計<strong id="calendarDayYen">0</strong></div>
      </div>
    </div>

    <div id="calendarWeekView" class="hidden">
      <div class="week-wrap">
        <button class="week-swipe-btn" id="weekPrevBtn">←</button>
        <div class="week-slide">
          <div class="week-header" id="weekLabel"></div>
          <div class="week-card">
            <div class="week-list" id="weekPreviewList"></div>
            <div class="summary-bar" style="margin-top:12px">
              <div class="summary-item">イベント数<strong id="weekCount">0</strong></div>
              <div class="summary-item">¥合計<strong id="weekYen">0</strong></div>
            </div>
          </div>
        </div>
        <button class="week-swipe-btn" id="weekNextBtn">→</button>
      </div>
    </div>

    <div id="calendarMonthView" class="hidden">
      <div class="month-nav">
        <button id="monthPrevBtn">← 前月</button>
        <div class="month-header" id="monthLabel"></div>
        <button id="monthNextBtn">次月 →</button>
      </div>
      <div class="calendar-grid">
        <div class="weekdays">
          <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
        </div>
        <div class="grid" id="monthGrid"></div>
      </div>
      <div class="summary-bar">
        <div class="summary-item">イベント数<strong id="calendarMonthCount">0</strong></div>
        <div class="summary-item">¥合計<strong id="calendarMonthYen">0</strong></div>
      </div>
    </div>
  </section>

  <section class="screen" id="listScreen">
    <div class="topbar">
      <button class="sync-btn" id="bulkSyncList">一括同期</button>
      <div class="title">イベント一覧</div>
      <div class="seg" id="listSeg">
        <button data-mode="day" class="active">DAY</button>
        <button data-mode="week">WEEK</button>
        <button data-mode="month">MONTH</button>
      </div>
    </div>
    <div class="cards" id="listCards"></div>
    <div class="summary-bar">
      <div class="summary-item">イベント数<strong id="listCount">0</strong></div>
      <div class="summary-item">¥合計<strong id="listYen">0</strong></div>
    </div>
  </section>

  <section class="screen" id="registerScreen">
    <div class="topbar">
      <div style="width:92px"></div>
      <div class="title">イベント登録</div>
      <div style="width:92px"></div>
    </div>
    <div class="register-panel" style="padding:16px">
      <div class="field">
        <label>属性</label>
        <div class="type-grid" id="typeGrid"></div>
      </div>
      <div class="field">
        <label>名称 <span class="helper">必須</span></label>
        <input class="input" id="regTitle" maxlength="80" placeholder="例：春ツアー東京公演">
      </div>
      <div class="row">
        <div class="field">
          <label>日付</label>
          <input class="input" id="regDate" type="date">
        </div>
        <div class="field">
          <label>開始 <span class="helper">必須</span></label>
          <input class="input" id="regStart" type="time">
        </div>
        <div class="field">
          <label>終了</label>
          <input class="input" id="regEnd" type="time">
        </div>
      </div>
      <div class="field">
        <label>場所 <span class="helper">15字まで</span></label>
        <input class="input" id="regPlace" maxlength="15" placeholder="例：渋谷ホール">
      </div>
      <div class="field">
        <label>¥ <span class="helper">数字のみ</span></label>
        <input class="input" id="regYen" inputmode="numeric" pattern="[0-9]*" placeholder="4500">
      </div>
      <div class="field">
        <label>ハート</label>
        <div class="heart-grid" id="heartGrid"></div>
      </div>
      <div class="field">
        <label>参加者</label>
        <div class="row">
          <input class="input" id="participantCountInput" inputmode="numeric" pattern="[0-9]*" placeholder="人数">
          <button class="ghost-btn" id="addParticipantBtn" type="button">＋ 追加</button>
        </div>
        <div class="participants-wrap" id="participantsWrap"></div>
      </div>
      <div class="ocr-box" style="padding:12px">
        OCRは仮実装です。名称・時間OCR、新規参加者OCR（複数画像）を確認できます。
      </div>
      <div class="row" style="margin-top:12px">
        <button class="ghost-btn" id="ocrBasicBtn" type="button">OCR（名称・時間）</button>
        <button class="ghost-btn" id="ocrParticipantsBtn" type="button">OCR（参加者）</button>
      </div>
      <div style="padding-top:12px">
        <button class="cta-btn" id="createEventBtn" type="button" style="width:100%;min-height:54px">登録する</button>
      </div>
    </div>
  </section>
</div>

<div class="bottom-nav">
  <button class="active" data-screen="calendar">カレンダー</button>
  <button data-screen="list">イベント一覧</button>
  <button data-screen="register">イベント登録</button>
</div>

<div class="overlay" id="detailOverlay">
  <div class="card-pop">
    <div class="detail-card" id="detailCard">
      <button class="menu-btn" id="detailMenuBtn" type="button">…</button>
      <div class="menu-actions" id="detailMenuActions">
        <button class="menu-action-btn" type="button" data-action="edit">編集</button>
        <button class="menu-action-btn" type="button" data-action="sync">カレンダー同期</button>
        <button class="menu-action-btn" type="button" data-action="delete">削除</button>
      </div>
      <button class="close-btn" id="detailCloseBtn" type="button">×</button>
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-type" id="detailType"></div>
      <div class="detail-meta" id="detailTime"></div>
      <div class="detail-meta" id="detailPlace"></div>
      <div class="detail-meta" id="detailYen"></div>
      <div class="detail-hearts" id="detailHearts"></div>
      <div class="detail-count" id="detailCountRow">参加人数 0人</div>
      <div class="section-card hidden" id="detailParticipantsPanel" style="margin-top:12px;padding:14px">
        <div style="font-size:12px;font-weight:900;color:var(--muted);margin-bottom:8px">参加者一覧</div>
        <div id="detailParticipantsList"></div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="formOverlay">
  <div class="form-pop">
    <button class="menu-btn" id="formConfirmBtn" type="button">確定</button>
    <button class="close-btn" id="formCloseBtn" type="button">×</button>
    <div class="form-pop-head">
      <div class="form-pop-title">イベント編集</div>
      <div class="form-pop-sub">詳細 → 編集 の変化が分かるよう、カラーなしUIにしています。</div>
    </div>
    <div class="field">
      <label>属性</label>
      <div class="type-grid" id="editTypeGrid"></div>
    </div>
    <div class="field">
      <label>名称 <span class="helper">必須</span></label>
      <input class="input" id="editTitle" maxlength="80">
    </div>
    <div class="row">
      <div class="field">
        <label>日付</label>
        <input class="input" id="editDate" type="date">
      </div>
      <div class="field">
        <label>開始 <span class="helper">必須</span></label>
        <input class="input" id="editStart" type="time">
      </div>
      <div class="field">
        <label>終了</label>
        <input class="input" id="editEnd" type="time">
      </div>
    </div>
    <div class="field">
      <label>場所 <span class="helper">15字まで</span></label>
      <input class="input" id="editPlace" maxlength="15">
    </div>
    <div class="field">
      <label>¥ <span class="helper">数字のみ</span></label>
      <input class="input" id="editYen" inputmode="numeric" pattern="[0-9]*">
    </div>
    <div class="field">
      <label>ハート</label>
      <div class="heart-grid" id="editHeartGrid"></div>
    </div>
    <div class="field">
      <label>参加者</label>
      <div class="row">
        <input class="input" id="editParticipantCount" inputmode="numeric" pattern="[0-9]*" placeholder="人数">
        <button class="ghost-btn" id="editAddParticipantBtn" type="button">＋ 追加</button>
      </div>
      <div class="row">
        <button class="ghost-btn" id="editParticipantOcrBtn" type="button">参加者OCR</button>
        <div class="helper" style="display:flex;align-items:center">複数画像対応</div>
      </div>
      <div class="participants-wrap" id="editParticipantsWrap"></div>
    </div>
  </div>
</div>

<div class="overlay" id="weekOverlay">
  <div class="confirm-pop" style="width:min(92vw,480px);max-height:82dvh;overflow:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
      <div style="font-size:20px;font-weight:900" id="weekOverlayTitle">週詳細</div>
      <button class="close-btn" id="weekCloseBtn" type="button" style="position:static">×</button>
    </div>
    <div class="cards" id="weekOverlayCards" style="margin-top:12px"></div>
  </div>
</div>

<div class="overlay" id="ocrConfirmOverlay">
  <div class="confirm-pop">
    <div style="font-size:20px;font-weight:900">OCR確認</div>
    <div class="field" style="margin-top:12px">
      <label>名称</label>
      <input class="input" id="ocrConfirmTitle">
    </div>
    <div class="row">
      <div class="field">
        <label>開始</label>
        <input class="input" id="ocrConfirmStart" type="time">
      </div>
      <div class="field">
        <label>終了</label>
        <input class="input" id="ocrConfirmEnd" type="time">
      </div>
    </div>
    <div class="field hidden" id="ocrParticipantsConfirmField">
      <label>参加者OCR結果</label>
      <div id="ocrParticipantsConfirmList" class="section-card" style="padding:12px"></div>
    </div>
    <div class="confirm-actions">
      <button class="ghost-btn" id="ocrCancelBtn" type="button">キャンセル</button>
      <button class="primary-btn" id="ocrApplyBtn" type="button">反映</button>
    </div>
  </div>
</div>

<div class="overlay" id="confirmOverlay">
  <div class="confirm-pop">
    <div style="font-size:20px;font-weight:900" id="confirmTitle">確認</div>
    <div style="margin-top:10px;color:var(--muted);line-height:1.5" id="confirmMessage"></div>
    <div class="confirm-actions" id="confirmActions"></div>
  </div>
</div>

<input id="ocrBasicInput" type="file" accept="image/*" class="hidden">
<input id="ocrParticipantsInput" type="file" accept="image/*" multiple class="hidden">

<div class="toast" id="toast"></div>

<script>
(() => {
  const TYPE_CONFIG = {
    EVENT:{color:'#f59e0b', bg:'rgba(245,158,11,.10)'},
    LIVE:{color:'#3b82f6', bg:'rgba(59,130,246,.10)'},
    TV:{color:'#ec4899', bg:'rgba(236,72,153,.10)'},
    RADIO:{color:'#ef4444', bg:'rgba(239,68,68,.10)'},
    REMIND:{color:'#22c55e', bg:'rgba(34,197,94,.10)'},
    NOMI:{color:'#facc15', bg:'rgba(250,204,21,.10)'},
    MEMO:{color:'#8b5cf6', bg:'rgba(139,92,246,.10)'}
  };
  const HEARTS = ['🩵','💜','❤️','🩷','💚','💛','🧡'];

  const state = {
    events: [],
    activeScreen: 'calendar',
    mode: 'day',
    focusDate: todayString(new Date()),
    detailId: null,
    weekBaseDate: startOfWeek(new Date()),
    editingId: null,
    editDirty: false,
    ocrContext: null
  };

  function uid(){ return Math.random().toString(36).slice(2,10); }
  function todayString(d){ return new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,10); }
  function offsetDate(base, days){
    const d = new Date(base);
    d.setDate(d.getDate()+days);
    return todayString(d);
  }
  function escapeHtml(str){
    return String(str || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
  }
  function safeNumber(v){
    const n = parseInt(String(v || '').replace(/[^\d]/g,''),10);
    return Number.isFinite(n) ? n : 0;
  }
  function ellipsis(str, len=15){
    const s = String(str || '');
    return s.length > len ? s.slice(0, len) + '…' : s;
  }
  function formatDate(dateStr){
    const d = new Date(dateStr + 'T00:00:00');
    return `${d.getMonth()+1}/${d.getDate()}(${['日','月','火','水','木','金','土'][d.getDay()]})`;
  }
  function formatMonth(dateStr){
    const d = new Date(dateStr + 'T00:00:00');
    return `${d.getFullYear()}年${d.getMonth()+1}月`;
  }
  function startOfWeek(date){
    const d = new Date(date);
    d.setHours(0,0,0,0);
    d.setDate(d.getDate() - d.getDay());
    return d;
  }
  function inSameWeek(dateStr, baseDate){
    const d = new Date(dateStr + 'T00:00:00');
    const start = startOfWeek(baseDate);
    const end = new Date(start);
    end.setDate(end.getDate()+7);
    return d >= start && d < end;
  }
  function sortEvents(a,b){
    const x = `${a.date} ${a.startTime || '99:99'}`;
    const y = `${b.date} ${b.startTime || '99:99'}`;
    return x.localeCompare(y);
  }
  function yenSum(events){
    return events.reduce((sum, e) => sum + safeNumber(e.yen), 0);
  }
  function eventTimeText(ev){
    return ev.endTime ? `${ev.startTime}〜${ev.endTime}` : ev.startTime;
  }
  function uniqueHearts(events){
    const set = new Set();
    events.forEach(ev => (ev.hearts || []).forEach(h => set.add(h)));
    return HEARTS.filter(h => set.has(h));
  }
  function weekPriority(type){
    if(type === 'LIVE') return 1;
    if(type === 'EVENT') return 2;
    return 10;
  }
  function showToast(msg){
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  state.events = [
    {id:uid(), type:'LIVE', title:'春ツアー東京公演', date:offsetDate(new Date(),0), startTime:'18:30', endTime:'20:00', place:'渋谷ホール', yen:4500, hearts:['❤️','💛'], participants:[{name:'佐藤', attend:true},{name:'田中', attend:false}], calendarSynced:false},
    {id:uid(), type:'EVENT', title:'特典会', date:offsetDate(new Date(),0), startTime:'12:00', endTime:'13:00', place:'池袋会場', yen:2000, hearts:['🩵'], participants:[{name:'高橋', attend:true}], calendarSynced:false},
    {id:uid(), type:'TV', title:'音楽番組出演', date:offsetDate(new Date(),1), startTime:'21:00', endTime:'22:00', place:'フジテレビ', yen:0, hearts:['💜'], participants:[], calendarSynced:false},
    {id:uid(), type:'NOMI', title:'打ち上げ', date:offsetDate(new Date(),3), startTime:'22:00', endTime:'23:30', place:'新宿', yen:4200, hearts:['🧡','💚'], participants:[{name:'Aさん', attend:true},{name:'Bさん', attend:true},{name:'Cさん', attend:false}], calendarSynced:false},
    {id:uid(), type:'REMIND', title:'配信チケット購入', date:offsetDate(new Date(),7), startTime:'10:00', endTime:'10:30', place:'', yen:0, hearts:['💛'], participants:[], calendarSynced:false},
    {id:uid(), type:'MEMO', title:'衣装メモ整理', date:offsetDate(new Date(),12), startTime:'19:00', endTime:'19:30', place:'自宅', yen:0, hearts:['🩷'], participants:[], calendarSynced:false}
  ];

  const screens = {
    calendar: document.getElementById('calendarScreen'),
    list: document.getElementById('listScreen'),
    register: document.getElementById('registerScreen')
  };

  function setScreen(name){
    state.activeScreen = name;
    Object.entries(screens).forEach(([key, el]) => el.classList.toggle('active', key === name));
    document.querySelectorAll('.bottom-nav button').forEach(btn => btn.classList.toggle('active', btn.dataset.screen === name));
    render();
  }
  document.querySelectorAll('.bottom-nav button').forEach(btn => btn.addEventListener('click', () => setScreen(btn.dataset.screen)));

  function getCurrentPeriodEvents(){
    if(state.mode === 'day'){
      return state.events.filter(e => e.date === state.focusDate).sort(sortEvents);
    }
    if(state.mode === 'week'){
      return state.events.filter(e => inSameWeek(e.date, state.weekBaseDate)).sort(sortEvents);
    }
    const monthKey = state.focusDate.slice(0,7);
    return state.events.filter(e => e.date.slice(0,7) === monthKey).sort(sortEvents);
  }

  function createEventCard(ev){
    const cfg = TYPE_CONFIG[ev.type];
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'event-card';
    card.style.setProperty('--accent', cfg.color);
    card.style.background = cfg.bg;
    card.innerHTML = `
      <div class="event-type">${ev.type}</div>
      <div class="event-title">${escapeHtml(ev.title)}</div>
      <div class="event-sub">${eventTimeText(ev)}</div>
      <div class="event-sub">${escapeHtml(ev.place || '場所未入力')}</div>
      <div class="event-sub">¥ ${safeNumber(ev.yen).toLocaleString('ja-JP')}</div>
      <div class="count-row">参加人数 ${ev.participants.length}人</div>
      <div class="hearts">${(ev.hearts || []).map(h => `<span>${h}</span>`).join('')}</div>
    `;
    card.addEventListener('click', () => openDetail(ev.id));
    return card;
  }

  function renderCalendarDay(){
    const wrap = document.getElementById('calendarDayCards');
    const events = state.events.filter(e => e.date === state.focusDate).sort(sortEvents);
    document.getElementById('dayLabel').textContent = formatDate(state.focusDate);
    wrap.innerHTML = '';
    if(!events.length){
      wrap.innerHTML = `<div class="empty-box muted">この日のイベントはありません。</div>`;
    }else{
      events.forEach(ev => wrap.appendChild(createEventCard(ev)));
    }
    document.getElementById('calendarDayCount').textContent = events.length;
    document.getElementById('calendarDayYen').textContent = yenSum(events).toLocaleString('ja-JP');
  }

  function renderCalendarWeek(){
    const wrap = document.getElementById('weekPreviewList');
    const start = startOfWeek(state.weekBaseDate);
    const end = new Date(start);
    end.setDate(end.getDate()+6);
    document.getElementById('weekLabel').textContent = `${start.getMonth()+1}/${start.getDate()}〜${end.getMonth()+1}/${end.getDate()}`;
    const weekly = state.events.filter(e => inSameWeek(e.date, start)).sort((a,b) => {
      const pa = weekPriority(a.type), pb = weekPriority(b.type);
      if(pa !== pb) return pa - pb;
      return sortEvents(a,b);
    });
    const preview = weekly.slice(0,2).sort(sortEvents);
    wrap.innerHTML = '';
    if(!preview.length){
      wrap.innerHTML = `<div class="empty-box muted">この週のイベントはありません。</div>`;
    }else{
      preview.forEach(ev => wrap.appendChild(createEventCard(ev)));
    }
    document.getElementById('weekCount').textContent = weekly.length;
    document.getElementById('weekYen').textContent = yenSum(weekly).toLocaleString('ja-JP');
  }

  function renderCalendarMonth(){
    const grid = document.getElementById('monthGrid');
    grid.innerHTML = '';
    document.getElementById('monthLabel').textContent = formatMonth(state.focusDate);

    const d = new Date(state.focusDate + 'T00:00:00');
    const first = new Date(d.getFullYear(), d.getMonth(), 1);
    const last = new Date(d.getFullYear(), d.getMonth()+1, 0);
    const startPad = first.getDay();
    const totalCells = Math.ceil((startPad + last.getDate()) / 7) * 7;
    const monthEvents = state.events.filter(e => e.date.slice(0,7) === state.focusDate.slice(0,7));

    document.getElementById('calendarMonthCount').textContent = monthEvents.length;
    document.getElementById('calendarMonthYen').textContent = yenSum(monthEvents).toLocaleString('ja-JP');

    for(let i=0;i<totalCells;i++){
      const cell = document.createElement('button');
      cell.type = 'button';
      cell.className = 'day-cell';
      const dayNum = i - startPad + 1;

      if(dayNum < 1 || dayNum > last.getDate()){
        cell.disabled = true;
        cell.style.opacity = '.35';
        grid.appendChild(cell);
        continue;
      }

      const dateStr = `${first.getFullYear()}-${String(first.getMonth()+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      const dayEvents = monthEvents.filter(e => e.date === dateStr);
      const hearts = uniqueHearts(dayEvents);
      if(dayEvents.length) cell.classList.add('has-events');

      cell.innerHTML = `<div class="day-num">${dayNum}</div><div class="month-hearts">${hearts.map(h => `<span>${h}</span>`).join('')}</div>`;
      cell.addEventListener('click', () => {
        state.mode = 'day';
        state.focusDate = dateStr;
        syncModeButtons();
        render();
      });
      grid.appendChild(cell);
    }
  }

  function renderList(){
    const wrap = document.getElementById('listCards');
    const events = getCurrentPeriodEvents();
    wrap.innerHTML = '';
    if(!events.length){
      wrap.innerHTML = `<div class="empty-box muted">該当期間にイベントはありません。</div>`;
    }else{
      events.forEach(ev => wrap.appendChild(createEventCard(ev)));
    }
    document.getElementById('listCount').textContent = events.length;
    document.getElementById('listYen').textContent = yenSum(events).toLocaleString('ja-JP');
  }

  function syncModeButtons(){
    document.querySelectorAll('#calendarSeg button, #listSeg button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === state.mode);
    });
    document.getElementById('calendarDayView').classList.toggle('hidden', state.mode !== 'day');
    document.getElementById('calendarWeekView').classList.toggle('hidden', state.mode !== 'week');
    document.getElementById('calendarMonthView').classList.toggle('hidden', state.mode !== 'month');
  }

  document.querySelectorAll('#calendarSeg button, #listSeg button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.mode = btn.dataset.mode;
      syncModeButtons();
      render();
    });
  });

  document.getElementById('weekPrevBtn').addEventListener('click', () => {
    state.weekBaseDate.setDate(state.weekBaseDate.getDate()-7);
    state.focusDate = todayString(state.weekBaseDate);
    render();
  });
  document.getElementById('weekNextBtn').addEventListener('click', () => {
    state.weekBaseDate.setDate(state.weekBaseDate.getDate()+7);
    state.focusDate = todayString(state.weekBaseDate);
    render();
  });
  document.getElementById('monthPrevBtn').addEventListener('click', () => {
    const d = new Date(state.focusDate + 'T00:00:00');
    d.setMonth(d.getMonth()-1);
    state.focusDate = todayString(new Date(d.getFullYear(), d.getMonth(), 1));
    render();
  });
  document.getElementById('monthNextBtn').addEventListener('click', () => {
    const d = new Date(state.focusDate + 'T00:00:00');
    d.setMonth(d.getMonth()+1);
    state.focusDate = todayString(new Date(d.getFullYear(), d.getMonth(), 1));
    render();
  });

  function renderTypeButtons(target, selected, onChange){
    target.innerHTML = '';
    Object.keys(TYPE_CONFIG).forEach(type => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'type-btn' + (type === selected ? ' active' : '');
      btn.textContent = type;
      btn.style.background = type === selected ? TYPE_CONFIG[type].bg : '#fff';
      btn.style.borderColor = type === selected ? TYPE_CONFIG[type].color : '#e5e7eb';
      btn.style.color = TYPE_CONFIG[type].color;
      btn.addEventListener('click', () => onChange(type));
      target.appendChild(btn);
    });
  }

  function renderHeartButtons(target, selected, onToggle){
    target.innerHTML = '';
    HEARTS.forEach(h => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'heart-item';
      const checked = selected.includes(h);
      btn.style.background = checked ? 'rgba(17,24,39,.07)' : '#fff';
      btn.innerHTML = `${h} ${checked ? '☑' : '☐'}`;
      btn.addEventListener('click', () => onToggle(h));
      target.appendChild(btn);
    });
  }

  function makeParticipantRow(data, parent, countInput){
    const row = document.createElement('div');
    row.className = 'participant-row';
    row.innerHTML = `
      <input class="input participant-name" maxlength="15" placeholder="参加者名" value="${escapeHtml(data?.name || '')}">
      <label class="small-btn" style="display:flex;align-items:center;gap:6px;justify-content:center;padding:10px 12px">
        <input class="participant-attend" type="checkbox" ${data?.attend ? 'checked' : ''}> 出欠
      </label>
      <button class="small-btn participant-remove" type="button">−</button>
    `;
    row.querySelector('.participant-remove').addEventListener('click', () => {
      row.remove();
      syncParticipantCount(parent, countInput, false);
    });
    parent.appendChild(row);
    syncParticipantCount(parent, countInput, false);
  }

  function syncParticipantCount(parent, countInput, preserveManual){
    if(!preserveManual || !countInput.dataset.touched){
      countInput.value = parent.querySelectorAll('.participant-row').length;
    }
  }

  function collectParticipants(parent){
    return [...parent.querySelectorAll('.participant-row')].map(row => ({
      name: ellipsis(row.querySelector('.participant-name').value.trim(), 15),
      attend: row.querySelector('.participant-attend').checked
    })).filter(v => v.name);
  }

  function validateEventForm(form){
    if(!form.title.trim()) return '名称は必須です。';
    if(!form.startTime) return '開始時間は必須です。';
    if(!form.date) return '日付を入力してください。';
    if(form.place && form.place.length > 15) return '場所は15字以内で入力してください。';
    if(!/^\d*$/.test(form.yenText)) return '¥は数字のみ入力できます。';
    return '';
  }

  const regState = { type:'EVENT', hearts:[] };
  const regWrap = document.getElementById('participantsWrap');
  const regCount = document.getElementById('participantCountInput');

  function regTypeHandler(type){
    regState.type = type;
    renderTypeButtons(document.getElementById('typeGrid'), regState.type, regTypeHandler);
  }
  function regHeartHandler(h){
    regState.hearts = regState.hearts.includes(h) ? regState.hearts.filter(v => v !== h) : [...regState.hearts, h];
    renderHeartButtons(document.getElementById('heartGrid'), regState.hearts, regHeartHandler);
  }
  renderTypeButtons(document.getElementById('typeGrid'), regState.type, regTypeHandler);
  renderHeartButtons(document.getElementById('heartGrid'), regState.hearts, regHeartHandler);
  document.getElementById('addParticipantBtn').addEventListener('click', () => makeParticipantRow({}, regWrap, regCount));
  regCount.addEventListener('input', () => regCount.dataset.touched = '1');
  makeParticipantRow({}, regWrap, regCount);
  makeParticipantRow({}, regWrap, regCount);

  document.getElementById('createEventBtn').addEventListener('click', () => {
    const form = {
      type: regState.type,
      title: document.getElementById('regTitle').value.trim(),
      date: document.getElementById('regDate').value,
      startTime: document.getElementById('regStart').value,
      endTime: document.getElementById('regEnd').value,
      place: ellipsis(document.getElementById('regPlace').value.trim(), 15),
      yenText: document.getElementById('regYen').value.trim(),
      hearts: [...regState.hearts],
      participants: collectParticipants(regWrap)
    };
    const err = validateEventForm(form);
    if(err){ alert(err); return; }

    state.events.unshift({
      id: uid(),
      type: form.type,
      title: form.title,
      date: form.date,
      startTime: form.startTime,
      endTime: form.endTime,
      place: form.place,
      yen: safeNumber(form.yenText),
      hearts: form.hearts,
      participants: form.participants,
      calendarSynced: false
    });

    resetRegister();
    state.focusDate = form.date;
    state.weekBaseDate = startOfWeek(new Date(form.date + 'T00:00:00'));
    setScreen('calendar');
    state.mode = 'day';
    syncModeButtons();
    render();
    showToast('登録しました');
  });

  function resetRegister(){
    ['regTitle','regDate','regStart','regEnd','regPlace','regYen'].forEach(id => document.getElementById(id).value = '');
    regState.type = 'EVENT';
    regState.hearts = [];
    renderTypeButtons(document.getElementById('typeGrid'), regState.type, regTypeHandler);
    renderHeartButtons(document.getElementById('heartGrid'), regState.hearts, regHeartHandler);
    regWrap.innerHTML = '';
    regCount.value = '';
    regCount.dataset.touched = '';
    makeParticipantRow({}, regWrap, regCount);
    makeParticipantRow({}, regWrap, regCount);
  }

  function openDetail(eventId){
    state.detailId = eventId;
    const ev = state.events.find(e => e.id === eventId);
    if(!ev) return;
    const cfg = TYPE_CONFIG[ev.type];
    const card = document.getElementById('detailCard');
    card.style.setProperty('--accent', cfg.color);
    card.style.background = cfg.bg;
    document.getElementById('detailTitle').textContent = ev.title;
    document.getElementById('detailType').textContent = ev.type;
    document.getElementById('detailTime').textContent = eventTimeText(ev);
    document.getElementById('detailPlace').textContent = ev.place || '場所未入力';
    document.getElementById('detailYen').textContent = `¥ ${safeNumber(ev.yen).toLocaleString('ja-JP')}`;
    document.getElementById('detailHearts').innerHTML = (ev.hearts || []).map(h => `<span>${h}</span>`).join('');
    document.getElementById('detailCountRow').textContent = `参加人数 ${ev.participants.length}人`;
    document.getElementById('detailParticipantsList').innerHTML = ev.participants.length
      ? ev.participants.map(p => `<div style="padding:8px 0;border-top:1px solid #eee">${escapeHtml(p.name)} ${p.attend ? '☑' : '☐'}</div>`).join('')
      : `<div class="muted">参加者なし</div>`;
    document.getElementById('detailParticipantsPanel').classList.add('hidden');
    document.getElementById('detailMenuActions').classList.remove('show');
    document.getElementById('detailOverlay').classList.add('show');
  }

  function closeDetail(){
    document.getElementById('detailOverlay').classList.remove('show');
    document.getElementById('detailMenuActions').classList.remove('show');
  }
  document.getElementById('detailCloseBtn').addEventListener('click', closeDetail);
  document.getElementById('detailOverlay').addEventListener('click', (e) => {
    if(e.target.id === 'detailOverlay') closeDetail();
  });
  document.getElementById('detailCountRow').addEventListener('click', () => {
    document.getElementById('detailParticipantsPanel').classList.toggle('hidden');
  });
  document.getElementById('detailMenuBtn').addEventListener('click', () => {
    document.getElementById('detailMenuActions').classList.toggle('show');
  });
  document.getElementById('detailMenuActions').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-action]');
    if(!btn) return;
    const action = btn.dataset.action;
    const id = state.detailId;

    if(action === 'edit') openEdit(id);
    if(action === 'sync') syncSingle(id);
    if(action === 'delete'){
      confirmDialog('削除確認','このイベントを削除します。元に戻せません。',[
        {label:'キャンセル', style:'ghost'},
        {label:'削除する', style:'primary', onClick:() => deleteEvent(id)}
      ]);
    }
    document.getElementById('detailMenuActions').classList.remove('show');
  });

  function deleteEvent(id){
    state.events = state.events.filter(e => e.id !== id);
    closeDetail();
    render();
    showToast('削除しました');
  }

  function syncSingle(id){
    const ev = state.events.find(e => e.id === id);
    if(!ev) return;
    ev.calendarSynced = true;
    render();
    showToast('カレンダー同期しました');
  }

  const editState = { type:'EVENT', hearts:[] };
  function editTypeHandler(type){
    editState.type = type;
    state.editDirty = true;
    renderTypeButtons(document.getElementById('editTypeGrid'), editState.type, editTypeHandler);
  }
  function editHeartHandler(h){
    editState.hearts = editState.hearts.includes(h) ? editState.hearts.filter(v => v !== h) : [...editState.hearts, h];
    state.editDirty = true;
    renderHeartButtons(document.getElementById('editHeartGrid'), editState.hearts, editHeartHandler);
  }

  function openEdit(id){
    const ev = state.events.find(e => e.id === id);
    if(!ev) return;
    state.editingId = id;
    state.editDirty = false;

    document.getElementById('editTitle').value = ev.title;
    document.getElementById('editDate').value = ev.date;
    document.getElementById('editStart').value = ev.startTime;
    document.getElementById('editEnd').value = ev.endTime || '';
    document.getElementById('editPlace').value = ev.place || '';
    document.getElementById('editYen').value = ev.yen ?? '';
    document.getElementById('editParticipantCount').value = ev.participants.length;
    document.getElementById('editParticipantCount').dataset.touched = '';

    editState.type = ev.type;
    editState.hearts = [...(ev.hearts || [])];
    renderTypeButtons(document.getElementById('editTypeGrid'), editState.type, editTypeHandler);
    renderHeartButtons(document.getElementById('editHeartGrid'), editState.hearts, editHeartHandler);

    const wrap = document.getElementById('editParticipantsWrap');
    wrap.innerHTML = '';
    (ev.participants.length ? ev.participants : [{name:'', attend:false}]).forEach(p => makeParticipantRow(p, wrap, document.getElementById('editParticipantCount')));

    document.getElementById('formOverlay').classList.add('show');
  }

  document.getElementById('editAddParticipantBtn').addEventListener('click', () => {
    makeParticipantRow({}, document.getElementById('editParticipantsWrap'), document.getElementById('editParticipantCount'));
    state.editDirty = true;
  });
  document.getElementById('editParticipantCount').addEventListener('input', () => {
    document.getElementById('editParticipantCount').dataset.touched = '1';
    state.editDirty = true;
  });
  document.querySelectorAll('#formOverlay input').forEach(el => {
    el.addEventListener('input', () => state.editDirty = true);
    el.addEventListener('change', () => state.editDirty = true);
  });

  function saveEdit(){
    const ev = state.events.find(e => e.id === state.editingId);
    if(!ev) return;
    const form = {
      type: editState.type,
      title: document.getElementById('editTitle').value.trim(),
      date: document.getElementById('editDate').value,
      startTime: document.getElementById('editStart').value,
      endTime: document.getElementById('editEnd').value,
      place: ellipsis(document.getElementById('editPlace').value.trim(), 15),
      yenText: document.getElementById('editYen').value.trim(),
      hearts: [...editState.hearts],
      participants: collectParticipants(document.getElementById('editParticipantsWrap'))
    };
    const err = validateEventForm(form);
    if(err){ alert(err); return; }

    Object.assign(ev, {
      type: form.type,
      title: form.title,
      date: form.date,
      startTime: form.startTime,
      endTime: form.endTime,
      place: form.place,
      yen: safeNumber(form.yenText),
      hearts: form.hearts,
      participants: form.participants
    });

    state.editDirty = false;
    document.getElementById('formOverlay').classList.remove('show');
    state.focusDate = form.date;
    state.weekBaseDate = startOfWeek(new Date(form.date + 'T00:00:00'));
    render();
    openDetail(ev.id);
    showToast('保存しました');
  }

  function attemptCloseForm(){
    if(!state.editDirty){
      document.getElementById('formOverlay').classList.remove('show');
      return;
    }
    confirmDialog('未保存の変更があります','保存されていない内容は消えます。',[
      {label:'戻る', style:'ghost'},
      {label:'破棄して閉じる', style:'ghost', onClick:() => {
        state.editDirty = false;
        document.getElementById('formOverlay').classList.remove('show');
      }},
      {label:'保存する', style:'primary', onClick:saveEdit}
    ]);
  }

  document.getElementById('formConfirmBtn').addEventListener('click', saveEdit);
  document.getElementById('formCloseBtn').addEventListener('click', attemptCloseForm);
  document.getElementById('formOverlay').addEventListener('click', (e) => {
    if(e.target.id === 'formOverlay') attemptCloseForm();
  });

  function openWeekOverlay(baseDate){
    const start = startOfWeek(baseDate);
    const end = new Date(start);
    end.setDate(end.getDate()+6);
    document.getElementById('weekOverlayTitle').textContent = `${start.getMonth()+1}/${start.getDate()}〜${end.getMonth()+1}/${end.getDate()}`;
    const events = state.events.filter(e => inSameWeek(e.date, start)).sort(sortEvents);
    const wrap = document.getElementById('weekOverlayCards');
    wrap.innerHTML = '';
    if(!events.length){
      wrap.innerHTML = `<div class="empty-box muted">この週のイベントはありません。</div>`;
    }else{
      events.forEach(ev => wrap.appendChild(createEventCard(ev)));
    }
    document.getElementById('weekOverlay').classList.add('show');
  }
  document.getElementById('weekPreviewList').addEventListener('click', (e) => {
    if(e.target.closest('.event-card')) return;
    openWeekOverlay(state.weekBaseDate);
  });
  document.getElementById('weekCloseBtn').addEventListener('click', () => document.getElementById('weekOverlay').classList.remove('show'));
  document.getElementById('weekOverlay').addEventListener('click', (e) => {
    if(e.target.id === 'weekOverlay') document.getElementById('weekOverlay').classList.remove('show');
  });

  function confirmDialog(title, message, actions){
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMessage').textContent = message;
    const wrap = document.getElementById('confirmActions');
    wrap.innerHTML = '';
    actions.forEach(action => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = action.style === 'primary' ? 'primary-btn' : 'ghost-btn';
      btn.textContent = action.label;
      btn.addEventListener('click', () => {
        document.getElementById('confirmOverlay').classList.remove('show');
        if(action.onClick) action.onClick();
      });
      wrap.appendChild(btn);
    });
    document.getElementById('confirmOverlay').classList.add('show');
  }
  document.getElementById('confirmOverlay').addEventListener('click', (e) => {
    if(e.target.id === 'confirmOverlay') document.getElementById('confirmOverlay').classList.remove('show');
  });

  function bulkSyncCurrent(){
    const events = getCurrentPeriodEvents();
    events.forEach(e => e.calendarSynced = true);
    render();
    showToast(`${events.length}件を一括同期しました`);
  }
  document.getElementById('bulkSyncCalendar').addEventListener('click', bulkSyncCurrent);
  document.getElementById('bulkSyncList').addEventListener('click', bulkSyncCurrent);

  document.getElementById('ocrBasicBtn').addEventListener('click', () => {
    state.ocrContext = {kind:'basic-register'};
    document.getElementById('ocrBasicInput').click();
  });
  document.getElementById('ocrParticipantsBtn').addEventListener('click', () => {
    state.ocrContext = {kind:'participants-register'};
    document.getElementById('ocrParticipantsInput').click();
  });
  document.getElementById('editParticipantOcrBtn').addEventListener('click', () => {
    state.ocrContext = {kind:'participants-edit'};
    document.getElementById('ocrParticipantsInput').click();
  });

  async function runOCR(file){
    showToast('OCR中…');
    try{
      const result = await Tesseract.recognize(file, 'jpn+eng');
      return result.data.text || '';
    }catch(err){
      console.error(err);
      alert('OCRに失敗しました。通信状態をご確認ください。');
      return '';
    }
  }

  function parseBasicOCR(text){
    const cleaned = text.replace(/[：]/g, ':');
    const times = [...cleaned.matchAll(/(\d{1,2}):(\d{2})/g)].map(m => `${String(m[1]).padStart(2,'0')}:${m[2]}`);
    const lines = cleaned.split(/\r?\n/).map(v => v.trim()).filter(Boolean);
    const title = lines.find(v => !/\d{1,2}:\d{2}/.test(v)) || '';
    return {
      title: ellipsis(title, 80),
      startTime: times[0] || '',
      endTime: times[1] || ''
    };
  }

  function openOcrConfirmBasic(parsed){
    state.ocrContext = {...state.ocrContext, parsed};
    document.getElementById('ocrParticipantsConfirmField').classList.add('hidden');
    document.getElementById('ocrConfirmTitle').value = parsed.title || '';
    document.getElementById('ocrConfirmStart').value = parsed.startTime || '';
    document.getElementById('ocrConfirmEnd').value = parsed.endTime || '';
    document.getElementById('ocrConfirmOverlay').classList.add('show');
  }

  function openOcrConfirmParticipants(lines){
    state.ocrContext = {...state.ocrContext, parsed:lines};
    document.getElementById('ocrParticipantsConfirmField').classList.remove('hidden');
    document.getElementById('ocrParticipantsConfirmList').innerHTML = lines.length
      ? lines.map(v => `<div style="padding:6px 0;border-top:1px solid #eee">${escapeHtml(v)}</div>`).join('')
      : `<div class="muted">結果なし</div>`;
    document.getElementById('ocrConfirmTitle').value = '';
    document.getElementById('ocrConfirmStart').value = '';
    document.getElementById('ocrConfirmEnd').value = '';
    document.getElementById('ocrConfirmOverlay').classList.add('show');
  }

  function applyParticipantsOCR(lines, wrap, countInput){
    wrap.innerHTML = '';
    lines.forEach(line => makeParticipantRow({name:line, attend:false}, wrap, countInput));
    if(!lines.length) makeParticipantRow({}, wrap, countInput);
    countInput.value = wrap.querySelectorAll('.participant-row').length;
  }

  document.getElementById('ocrBasicInput').addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if(!file) return;
    const text = await runOCR(file);
    openOcrConfirmBasic(parseBasicOCR(text));
    e.target.value = '';
  });

  document.getElementById('ocrParticipantsInput').addEventListener('change', async (e) => {
    const files = [...(e.target.files || [])];
    if(!files.length) return;
    const lines = [];
    for(const file of files){
      const text = await runOCR(file);
      text.split(/\r?\n/).map(v => v.trim()).filter(Boolean).forEach(line => lines.push(ellipsis(line, 15)));
    }
    const unique = [...new Set(lines)].filter(Boolean);
    openOcrConfirmParticipants(unique);
    e.target.value = '';
  });

  document.getElementById('ocrCancelBtn').addEventListener('click', () => {
    document.getElementById('ocrConfirmOverlay').classList.remove('show');
  });
  document.getElementById('ocrApplyBtn').addEventListener('click', () => {
    const ctx = state.ocrContext || {};
    if(ctx.kind === 'basic-register'){
      document.getElementById('regTitle').value = document.getElementById('ocrConfirmTitle').value.trim();
      document.getElementById('regStart').value = document.getElementById('ocrConfirmStart').value;
      document.getElementById('regEnd').value = document.getElementById('ocrConfirmEnd').value;
    }
    if(ctx.kind === 'participants-register'){
      applyParticipantsOCR(ctx.parsed || [], regWrap, regCount);
    }
    if(ctx.kind === 'participants-edit'){
      applyParticipantsOCR(ctx.parsed || [], document.getElementById('editParticipantsWrap'), document.getElementById('editParticipantCount'));
      state.editDirty = true;
    }
    document.getElementById('ocrConfirmOverlay').classList.remove('show');
    showToast('OCR結果を反映しました');
  });

  function render(){
    syncModeButtons();
    renderCalendarDay();
    renderCalendarWeek();
    renderCalendarMonth();
    renderList();
  }

  render();
})();
</script>
</body>
</html>
